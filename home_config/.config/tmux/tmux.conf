# ─────────────────────────────────────────────────────────────────────────────
#  TMUX PLUGIN MANAGER (TPM)
#  Ensure TPM is installed, then list plugins.
# ─────────────────────────────────────────────────────────────────────────────

# Set TMUX plugin manager path
set-environment -gF TMUX_PLUGIN_MANAGER_PATH '#{HOME}/.config/tmux/plugins/'

# Install TPM if it's not already installed
if 'test ! -d "${TMUX_PLUGIN_MANAGER_PATH}/tpm"' {
  run 'mkdir -p "${TMUX_PLUGIN_MANAGER_PATH}"'
  run 'git clone https://github.com/tmux-plugins/tpm "${TMUX_PLUGIN_MANAGER_PATH}/tpm"'
  run '${TMUX_PLUGIN_MANAGER_PATH}/tpm/bin/install_plugins'
}

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'dreknix/tmux-primary-ip'
# set -g @plugin 'omerxx/tmux-sessionx'

# ─────────────────────────────────────────────────────────────────────────────
#  GENERAL SETTINGS
#  Core tmux behavior and options.
# ─────────────────────────────────────────────────────────────────────────────

# Set prefix to C-space
unbind C-b
set -g prefix C-space
bind C-Space send-prefix

# Set default terminal to support 256 colors and RGB
set -g default-terminal 'screen-256color'
set-option -ag terminal-overrides ",xterm-256color:RGB"

# Enable mouse mode
set -g mouse on

# Start windows and panes indexing at 1 for easier navigation
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Set vi-mode for command and copy modes
set-window-option -g mode-keys vi

# set-option -g allow-rename off
# set-window-option -g automatic-rename off

# Enable passthrough for special key codes from terminals like Kitty
set-option -g extended-keys on

# Specifically tell tmux about Kitty's keyboard protocol extensions
set-window-option -g xterm-keys on

# ─────────────────────────────────────────────────────────────────────────────
#  KEYBINDINGS
#  Custom shortcuts for navigation and actions.
# ─────────────────────────────────────────────────────────────────────────────

# Window navigation
bind -n M-H previous-window
bind -n M-L next-window

# Create new windows and panes with the current path
unbind c
bind w new-window
unbind '"'
bind v split-window -v -c "#{pane_current_path}"
unbind %
bind h split-window -h -c "#{pane_current_path}"

# Keybindings for vi-mode in copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Toggle tmux-continuum restore (and by extension, resurrect's auto-save)
bind-key T run-shell "~/.config/tmux/scripts/toggle_continuum.sh"

# ─────────────────────────────────────────────────────────────────────────────
#  THEME & APPEARANCE
#  Configure the status bar and overall look.
# ─────────────────────────────────────────────────────────────────────────────

# Status bar position and refresh interval
set -g status-position top
set -g status-interval 5

# Status bar alignment and length
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 100

# Clear left status bar
set -g status-left ""

# Status bar right-side content
set -gF status-right '#{E:@catppuccin_status_primary_ip}'
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
# set -agF status-right "#{E:@catppuccin_status_battery}"

# --- Catppuccin Theme Settings ---
set -g @catppuccin_flavor "mocha" # latte, frappe, macchiato, or mocha
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_status "no"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_number "#I"
set -g @catppuccin_window_current_status_style "rounded"
set -g @catppuccin_window_current_text " #W"
set -ogq @catppuccin_window_current_number "#I"
set -g @catppuccin_status_module_text_bg '#{E:@thm_mantle}'

# ─────────────────────────────────────────────────────────────────────────────
#  PLUGIN CONFIGURATIONS
#  Custom settings for specific plugins.
# ─────────────────────────────────────────────────────────────────────────────

# tmux-continuum: auto-restore sessions on tmux start
set -g @continuum-restore 'on'   # try to auto-restore on tmux start
set -g @continuum-save-interval '15'  # example: save every 15 minutes

# set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes 'btop lazygit nvim atac yazi'

# tmux-sessionx: prefix + o
# No specific configuration needed here, functionality is via keybind.

# tmux-which-key: prefix + space
# No specific configuration needed here, functionality is via keybind.

# tmux-primary-ip: custom configuration file
source -F '#{d:current_file}/modules/primary_ip.conf'

# ─────────────────────────────────────────────────────────────────────────────
#  INITIALIZE TMUX PLUGIN MANAGER
#  This must be at the very end of the file.
# ─────────────────────────────────────────────────────────────────────────────

run "~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux"
run '~/.config/tmux/plugins/tpm/tpm'
