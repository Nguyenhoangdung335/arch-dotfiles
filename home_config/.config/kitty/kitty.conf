# vim:fileencoding=utf-8:foldmethod=marker
# font config
font_family      family='JetBrainsMono Nerd Font Mono' postscript_name=JetBrainsMonoNFM-Regular
font_size 12.0
bold_font        auto
italic_font      auto
bold_italic_font auto

enable_kitty_keyboard_protocol yes

# symbol_map
symbol_map U+23FB-U+23FE,U+2665,U+26A1,U+2B58,U+E000-U+E00A,U+E0A0-U+E0A3,U+E0B0-U+E0D4,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E6AA,U+E700-U+E7C5,U+EA60-U+EBEB,U+F000-U+F2E0,U+F300-U+F32F,U+F400-U+F4A9,U+F500-U+F8FF,U+F900-U+FA6D,U+FB00-U+FE0D,U+FE20-U+FE6F,U+FF00-U+FFEF JetBrainsMono Nerd Font

# window config
window_padding_width 10
background_opacity 0.7

# key bindings
kitty_mod ctrl+shift
map kitty_mod+k         scroll_line_up
map kitty_mod+j         scroll_line_down
map kitty_mod+page_up   scroll_page_up
map kitty_mod+page_down scroll_page_down
map cmd+home            scroll_home
map cmd+end             scroll_end
map kitty_mod+l         launch lazy-tmux picker --session-sort "captured:desc,name:asc"
map ctrl+enter          send_text all \x1b[13;5u
map ctrl+.              send_text all \x1b[46;5u
