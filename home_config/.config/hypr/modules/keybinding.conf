# See htrps://wiki.hypr.land/Configuring/Keywords/
$scripts_dir = ~/.config/hypr/scripts
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, T, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod SHIFT, Escape, exit,
# bind = $mainMod, E, exec, $fileManager
bind = $mainMod, E, exec, 
bind = $mainMod, Space, togglefloating,
bind = $mainMod, M, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, A, layoutmsg, togglesplit, # dwindle
bind = $mainMod, F, fullscreen, # dwindle
# bind = $mainMod, W, exec, $scripts_dir/launch_or_focus.sh $wallpapers $wallpapers 

# Move focus using vim keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to the left, right, up, down sections of the workspace using vim keys
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod, Tab, cyclenext
bind = $mainMod SHIFT, Tab, cyclenext, prev

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, O, togglespecialworkspace, magic
bind = $mainMod SHIFT, O, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Clipboard management with rofi and cliphist
bind = $mainMod, V, exec, ~/.config/hypr/scripts/cliphist_history.sh all
bind = $mainMod ALT, V, exec, ~/.config/hypr/scripts/cliphist_history.sh text
bind = $mainMod SHIFT, V, exec, ~/.config/hypr/scripts/cliphist_history.sh images
bind = $mainMod CTRL, V, exec, ~/.config/hypr/scripts/cliphist_history.sh wipe

# Snipping tool with PrintScreen or MainMod + ShiFT + S
# Screenshot a selected region and save it to a file
bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh select
# Screenshot a selected region and open it in swappy
bind = SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot.sh select_edit
# Screenshot a selected region and copy it to the clipboard
bind = CTRL, Print, exec, ~/.config/hypr/scripts/screenshot.sh select_copy
# Screenshot the entire screen and save it to a file
bind = $mainMod, Print, exec, ~/.config/hypr/scripts/screenshot.sh screen
# Screenshot the entire screen and open it in swappy
bind = $mainMod SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot.sh screen_edit
# Screenshot the entire screen and copy it to the clipboard
bind = $mainMod CTRL, Print, exec, ~/.config/hypr/scripts/screenshot.sh screen_copy

# bind = $mainMod, N, exec, qs ipc call sidebar toggle
bind = $mainMod, N, global, quickshell:toggleSidebar
bind = $mainMod, B, global, quickshell:toggleConnectionGraph

bind = $mainMod, period, layoutmsg, move +col
bind = $mainMod, comma, layoutmsg, swapcol l

# focus
