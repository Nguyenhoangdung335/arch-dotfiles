source = ~/.config/hypr/modules/env.conf
source = ~/.config/hypr/modules/monitors.conf
# source = ~/.config/hypr/modules/keybinding.conf
source = ~/.config/hypr/modules/windowrule.conf
source = ~/.config/hypr/modules/animation.conf
source = ~/.config/hypr/modules/submap/*

# Override values from nwg-displays
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/workspaces.conf

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu = ~/.local/bin/rofi-app-launcher.sh
$wallpapers = waypaper

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:
exec-once = systemctl --user start hyprpolkitagent
exec-once = waybar
exec-once = hyprsunset
exec-once = hypridle
exec-once = swww-daemon -q
exec-once = waypaper --restore
exec-once = udiskie &
exec-once = gammastep
exec-once = /usr/lib/geoclue-2.0/demos/agent

# Start the authentication agent (if you haven't already, e.g., polkit-gnome)
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = gnome-keyring-daemon --start --components=secrets

# Waybar tray icon
exec-once = fcitx5 &
exec-once = solaar -w hide &
exec-once = tailscale systray
exec-once = nm-applet
exec-once = gammastep-indicator

# Clipboard support
exec-once = wl-paste --type text --watch cliphist store # Stores only the text data
exec-once = wl-paste --type image --watch cliphist store # Stores only the image data


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 20

    border_size = 1

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle # or master
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 4

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.8
    dim_modal = true

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
    force_default_wallpaper = 2 # Set to 0 or 1 to disable the anime mascot wallpapers, 2 to enable the anime mascot walpapers
}

#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model = pc105
    # kb_options = custom_mods:rshift_to_mod3
    kb_options = 
    kb_rules =
    numlock_by_default = true 

    follow_mouse = 1

    # accel_profile = flat
    accel_profile = adaptive
    sensitivity = 0.6 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = false
        disable_while_typing = false

        scroll_factor = 1
    }
}

# https://wiki.hypr.land/Configuring/Variables/#gestures
# gestures {
#     workspace_swipe = false
# }

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
# device {
#     name = "MX Master S3"
#     sensitivity = -0.5
# }
device {
    # name = "elan050a:00-04f3:31b1-touchpad"
    name = "logitech-usb-receiver-1"
    enabled = false
}

###################
### KEYBINDINGS ###
###################
source = ~/.config/hypr/modules/keybinding.conf
